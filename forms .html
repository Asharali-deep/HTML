
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>
    <hr>

    <form action="action_page.html" method="post">

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

        <!-- Password -->
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <!-- Confirm Password -->
        <label for="confirm_password">Confirm Password:</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>

        <!-- Phone Number -->
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="03XXXXXXXXX" required><br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <!-- Age -->
        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" min="1" max="100"><br><br>

        <!-- Gender -->
        <h3>Gender</h3>

        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <!-- Country -->
        <label for="country">Country:</label><br>

        <select id="country" name="country">

            <option value="">Select Country</option>
            <option value="Pakistan">Pakistan</option>
            <option value="India">India</option>
            <option value="Bangladesh">Bangladesh</option>
            <option value="China">China</option>
            <option value="Turkey">Turkey</option>

        </select><br><br>
                <!-- City -->
        <label for="city">City:</label><br>
        <input type="text" id="city" name="city" placeholder="Enter your city"><br><br>

        <!-- Address -->
        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="30" placeholder="Enter your address"></textarea><br><br>

        <!-- Favorite Web Language -->
        <h3>Favorite Web Language</h3>

        <input type="radio" id="html" name="language" value="HTML">
        <label for="html">HTML</label><br>

        <input type="radio" id="css" name="language" value="CSS">
        <label for="css">CSS</label><br>

        <input type="radio" id="javascript" name="language" value="JavaScript">
        <label for="javascript">JavaScript</label><br><br>

        <!-- Hobbies -->
        <h3>Hobbies</h3>

        <input type="checkbox" id="reading" name="hobby" value="Reading">
        <label for="reading">Reading</label><br>

        <input type="checkbox" id="gaming" name="hobby" value="Gaming">
        <label for="gaming">Gaming</label><br>

        <input type="checkbox" id="sports" name="hobby" value="Sports">
        <label for="sports">Sports</label><br><br>

        <!-- Profile Picture -->
        <label for="photo">Profile Picture:</label><br>
        <input type="file" id="photo" name="photo"><br><br>

        <!-- Resume -->
        <label for="resume">Upload Resume:</label><br>
        <input type="file" id="resume" name="resume"><br><br>

        <!-- Favorite Color -->
        <label for="color">Favorite Color:</label><br>
        <input type="color" id="color" name="color"><br><br>

        <!-- Website -->
        <label for="website">Website:</label><br>
        <input type="url" id="website" name="website" placeholder="https://example.com"><br><br>

        <!-- Time -->
        <label for="time">Preferred Time:</label><br>
        <input type="time" id="time" name="time"><br><br>

        <!-- Date and Time -->
        <label for="datetime">Meeting Date & Time:</label><br>
        <input type="datetime-local" id="datetime" name="datetime"><br><br>

        <!-- Terms -->
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">
            I agree to the Terms and Conditions
        </label><br><br>

        <!-- Buttons -->
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">

    </form>

</body>
</html>
